<div class="modal modal-open modal-bottom sm:modal-middle" (click)="closed.emit(false)">
  <div class="modal-box max-w-md relative bg-base-200 p-0 overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-primary/10 rounded-t-[2.5rem] sm:rounded-3xl animate-fade-in-up" (click)="$event.stopPropagation()">
    
    <div class="bg-gradient-to-br from-primary/20 via-base-200 to-base-200 p-6 pb-4 relative">
      <button type="button" class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4 hover:bg-base-300" (click)="closed.emit(false)">✕</button>
      
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
            <path fill-rule="evenodd" d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z" clip-rule="evenodd" />
          </svg>
        </div>
        <div>
          <h3 class="font-extrabold text-2xl tracking-tight text-base-content leading-tight">Dodaj opinię</h3>
          <p class="text-xs text-base-content/60 font-medium mt-0.5">Twoje wrażenia pomogą innym klientom.</p>
        </div>
      </div>
    </div>
    
    <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()" class="px-6 pb-6 pt-2">
      
      <div class="bg-base-100 rounded-[2rem] p-6 mb-6 text-center border border-base-300 shadow-sm relative overflow-hidden">
        <label class="block text-xs font-black text-base-content/60 uppercase tracking-widest mb-4">Twoja Ocena Ogólna</label>
        
        <div class="rating rating-lg gap-2" (mouseleave)="hoveredRating = 0">
          @for (star of [1, 2, 3, 4, 5]; track star) {
            <input 
              type="radio" 
              name="rating-10" 
              class="mask mask-star-2 cursor-pointer transition-transform hover:scale-110 relative z-10"
              [checked]="reviewForm.value.rating === star"
              [class.bg-yellow-400]="(hoveredRating || reviewForm.value.rating || 0) >= star"
              [class.bg-base-content]="(hoveredRating || reviewForm.value.rating || 0) < star"
              (mouseover)="hoveredRating = star"
              (click)="setRating(star)"/>
          }
        </div>

        <div class="h-6 mt-2 relative">
          <span class="font-bold text-primary text-sm absolute inset-0 flex items-center justify-center transition-all duration-300 transform"
                [class.opacity-0]="!(hoveredRating || reviewForm.value.rating)"
                [class.scale-95]="!(hoveredRating || reviewForm.value.rating)"
                [class.opacity-100]="(hoveredRating || reviewForm.value.rating)">
            {{ currentRatingLabel }}
          </span>
        </div>
      </div>

      <div class="form-control">
        <label class="label pb-2 px-1"><span class="label-text font-bold text-sm text-base-content/80">Komentarz (opcjonalnie)</span></label>
        <textarea class="textarea bg-base-100 border border-base-300 shadow-inner focus:bg-base-100 focus:shadow-md focus:border-primary focus:ring-1 focus:ring-primary transition-all h-32 rounded-2xl resize-none text-sm placeholder:text-base-content/40 w-full" placeholder="Krótko podziel się swoimi wrażeniami z usługi..." formControlName="comment"></textarea>
      </div>

      <div class="flex flex-col-reverse sm:flex-row gap-3 sm:justify-end mt-8">
        <button type="button" class="btn btn-ghost rounded-xl font-bold px-6 text-base-content/70 hover:text-base-content" (click)="closed.emit(false)">Anuluj</button>
        <button type="submit" class="btn btn-primary rounded-xl font-bold px-8 shadow-md shadow-primary/20 hover:shadow-lg hover:shadow-primary/30 hover:-translate-y-0.5 transition-all" [disabled]="reviewForm.invalid || isSaving">
          @if(isSaving) { <span class="loading loading-spinner"></span> }
          Wyślij opinię
        </button>
      </div>
    </form>
  </div>
</div>
