<div class="modal modal-open modal-bottom sm:modal-middle" (click)="closed.emit(false)">
  <div class="modal-box max-w-md relative bg-base-100 p-0 overflow-hidden shadow-2xl rounded-t-[2.5rem] sm:rounded-3xl animate-fade-in-up" (click)="$event.stopPropagation()">
    
    <div class="bg-gradient-to-br from-primary/10 via-base-100 to-base-100 p-6 pb-4 relative">
      <button type="button" class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4 hover:bg-base-200" (click)="closed.emit(false)">✕</button>
      
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
            <path d="M21.731 2.269a2.625 2.625 0 00-3.712 0l-1.157 1.158 3.712 3.712 1.157-1.157a2.625 2.625 0 000-3.713z" />
            <path d="M19.571 8.286L15.714 4.429 4.706 15.436C4.249 15.892 4 16.51 4 17.158V20h2.842c.646 0 1.265-.248 1.722-.705l11.007-11.009z" />
          </svg>
        </div>
        <div>
          <h3 class="font-extrabold text-2xl tracking-tight text-base-content leading-tight">Edytuj opinię</h3>
          <p class="text-xs text-base-content/60 font-medium mt-0.5">Zaktualizuj swoje wrażenia.</p>
        </div>
      </div>
    </div>
    
    <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()" class="px-6 pb-6 pt-2">
      
      <div class="bg-base-200/50 rounded-2xl p-5 mb-6 text-center border border-base-200 shadow-sm relative overflow-hidden">
        <label class="block text-xs font-bold text-base-content/50 uppercase tracking-widest mb-3">Twoja Ocena Ogólna</label>
        
        <div class="rating rating-lg gap-2" (mouseleave)="hoveredRating = 0">
          @for (star of [1, 2, 3, 4, 5]; track star) {
            <input 
              type="radio" 
              name="rating-10" 
              class="mask mask-star-2 cursor-pointer transition-transform hover:scale-110 relative z-10"
              [checked]="reviewForm.value.rating === star"
              [class.bg-yellow-400]="(hoveredRating || reviewForm.value.rating || 0) >= star"
              [class.bg-base-300]="(hoveredRating || reviewForm.value.rating || 0) < star"
              (mouseover)="hoveredRating = star"
              (click)="setRating(star)"/>
          }
        </div>

        <div class="h-6 mt-2 relative">
          <span class="font-bold text-primary text-sm absolute inset-0 flex items-center justify-center transition-all duration-300 transform"
                [class.opacity-0]="!(hoveredRating || reviewForm.value.rating)"
                [class.scale-95]="!(hoveredRating || reviewForm.value.rating)"
                [class.opacity-100]="(hoveredRating || reviewForm.value.rating)">
            {{ currentRatingLabel }}
          </span>
        </div>
      </div>

      <div class="form-control">
        <label class="label pb-2"><span class="label-text font-bold text-sm text-base-content/80">Komentarz (opcjonalnie)</span></label>
        <textarea class="textarea bg-base-200/30 border-base-200 focus:bg-base-100 focus:border-primary transition-all h-28 rounded-xl resize-none text-sm placeholder:text-base-content/40" placeholder="Zaktualizuj swój komentarz..." formControlName="comment"></textarea>
      </div>

      <div class="flex flex-col-reverse sm:flex-row gap-3 sm:justify-end mt-8">
        <button type="button" class="btn btn-ghost rounded-xl font-bold px-6 text-base-content/70 hover:text-base-content" (click)="closed.emit(false)">Anuluj</button>
        <button type="submit" class="btn btn-primary rounded-xl font-bold px-8 shadow-md shadow-primary/20 hover:shadow-lg hover:shadow-primary/30 hover:-translate-y-0.5 transition-all" [disabled]="reviewForm.invalid || isSaving">
          @if(isSaving) { <span class="loading loading-spinner"></span> }
          Zapisz zmiany
        </button>
      </div>
    </form>
  </div>
</div>
